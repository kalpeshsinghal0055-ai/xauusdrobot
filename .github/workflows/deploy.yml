name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Patch vite.config.ts - remove Manus-only plugin
        run: |
          sed -i '/vite-plugin-manus-runtime/d' vite.config.ts
          sed -i 's/vitePluginManusRuntime(),//g' vite.config.ts
          sed -i 's/, vitePluginManusRuntime()//g' vite.config.ts

      - name: Build
        run: pnpm vite build
        env:
          NODE_ENV: production

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/public
          keep_files: false
          cname: xauusdrobot.com
