name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Prerender tooling is installed ad hoc so package.json/lockfile stay untouched.
      # pnpm v10 blocks puppeteer's postinstall, so Chromium is fetched explicitly.
      - name: Install prerender tooling
        run: |
          pnpm add -D puppeteer sirv
          pnpm exec puppeteer browsers install chrome

      - name: Patch vite.config.ts - remove Manus-only plugin
        run: |
          sed -i '/vite-plugin-manus-runtime/d' vite.config.ts
          sed -i 's/vitePluginManusRuntime(),//g' vite.config.ts
          sed -i 's/, vitePluginManusRuntime()//g' vite.config.ts

      - name: Build
        run: pnpm vite build
        env:
          NODE_ENV: production

      # Prerender React routes to static HTML so crawlers get real content.
      - name: Prerender routes
        run: node scripts/prerender.mjs

      - name: Add 404.html for SPA routing
        run: cp dist/public/index.html dist/public/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/public
          keep_files: false
          cname: xauusdrobot.com
